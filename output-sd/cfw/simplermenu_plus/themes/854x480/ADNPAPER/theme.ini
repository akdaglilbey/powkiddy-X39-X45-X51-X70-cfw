[GENERAL]
;Font for menu items
;font = resources/general/Acre.otf
font = resources/general/SourceHanSans-Regular-04.ttf
font_outline = 0
font_size = 20

;battery icons
batt_x = 715
batt_y = 10
batt_1  = resources/general/batt_20.png
batt_2  = resources/general/batt_40.png
batt_3  = resources/general/batt_60.png
batt_4  = resources/general/batt_80.png
batt_5  = resources/general/batt_100.png
batt_charging  = resources/general/batt_charging.png

;Font for the game count shown on the section "logos"
game_count_font = resources/general/BebasNeue.otf
game_count_font_size = 28
game_count_font_color = FFAE00
game_count_x = 10
game_count_y = 315
game_count_alignment = 0

;Font for text1 and text2
textX_font = resources/general/BebasNeue.otf

;Game List
game_list_alignment = 0
game_list_x = 6
game_list_y = 60
game_list_w = 250
transparent_shading = 0
items = 16
items_separation = 24

;Game art
art_x = 408
art_y = 54
art_max_w = 432
art_max_h = 322
art_text_distance_from_picture = 30
art_text_line_separation = 28
art_text_font_size = 24

;System Picture
system_w = 32
system_h = 32
system_x = -1
system_y = 6

;Section Name
text1_font_size = 28
text1_x = 580
text1_y = 30
text1_alignment = 2

;Game Count
text2_font_size = 24
text2_x = 102
text2_y = 460
text2_alignment = 1

;Fullscreen Mode
fullscreen_footer_on_top = 0
game_list_position_in_full = 12
items_in_fullscreen_mode = 28
colorful_fullscreen_menu = 0

;Miscelaneous
favorite_indicator = resources/general/favorite-alt.png
display_section_group_name = 1
section_groups_folder = resources/section_groups/
display_game_count = 1

;If a section is missing a value, it will try to find it in the default section
[DEFAULT]
;Color of the font used for items in menu mode
items_font_color = AAAAAA
;Color used for shading items in menu mode, if transparent_shading is not enabled
selected_item_background_color = 444444
;Color of the font used for selected items in menu mode
selected_item_font_color = FFAE00
;Game art font color
art_font_color = AAAAAA
;Background color to apply if colorful_fullscreen_menu is enabled
fullscreen_menu_background_color = FFFF00
;Color of the font used for items in the fullscreen menu
fullscreen_menu_font_color = FFAE00
;Section logo
logo = none
;Section system picture
system = resources/general/system.png
;Section background
background = resources/general/background.jpg

